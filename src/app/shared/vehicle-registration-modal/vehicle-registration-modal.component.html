<div class="vehicle-modal-overlay" 
     *ngIf="isVisible" 
     (click)="onBackdropClick($event)">
  <div class="vehicle-modal">
    <div class="modal-header">
      <h2>Register New Vehicle</h2>
      <button class="close-btn" (click)="closeModal()" title="Close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    
    <form class="vehicle-form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Vehicle Name *</label>
          <input 
            type="text" 
            id="name" 
            name="name"
            [(ngModel)]="formData.name"
            required
            placeholder="e.g., Truck 1"
          />
        </div>
        
        <div class="form-group">
          <label for="type">Vehicle Type *</label>
          <select 
            id="type" 
            name="type"
            [(ngModel)]="formData.type"
            required
          >
            <option value="">Select Type</option>
            <option *ngFor="let type of vehicleTypes" [value]="type">
              {{ type }}
            </option>
          </select>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="status">Status *</label>
          <select 
            id="status" 
            name="status"
            [(ngModel)]="formData.status"
            required
          >
            <option *ngFor="let status of statusOptions" [value]="status">
              {{ status }}
            </option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="lastMaintenance">Last Maintenance</label>
          <input 
            type="date" 
            id="lastMaintenance" 
            name="lastMaintenance"
            [(ngModel)]="formData.lastMaintenance"
          />
        </div>
      </div>
      
      <div class="form-group">
        <label for="driverId">Assigned Driver ID</label>
        <input 
          type="number" 
          id="driverId" 
          name="driverId"
          [(ngModel)]="formData.driverId"
          placeholder="Optional - Enter driver ID"
          min="1"
        />
      </div>
      
      <div class="form-actions">
        <button type="submit" class="register-btn">
          <span class="material-symbols-outlined">add</span>
          Register Vehicle
        </button>
        <button type="button" class="cancel-btn" (click)="closeModal()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
